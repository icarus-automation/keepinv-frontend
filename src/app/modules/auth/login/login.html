<div class="flex min-h-dvh flex-col bg-counter text-ink antialiased">
  <main class="flex flex-1 items-center justify-center px-6 pb-20 pt-12">
    <div class="w-full max-w-sm">
      <div class="flex items-baseline gap-px text-lg font-semibold tracking-tight">
        <span>asset</span><span class="text-muted">-wise</span>
      </div>
      <p class="mt-1.5 font-mono text-[0.7rem] uppercase tracking-[0.18em] text-muted">
        Counter terminal
      </p>

      <h1 class="mt-9 text-2xl font-semibold tracking-tight">Sign in</h1>
      <p class="mt-1.5 text-sm text-muted">Enter your credentials to open the counter.</p>

      <form class="mt-8 flex flex-col gap-5" [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div>
          <label for="email" class="block text-sm font-medium">Email</label>
          <input
            id="email"
            #emailInput
            type="email"
            formControlName="email"
            autocomplete="email"
            inputmode="email"
            [attr.aria-invalid]="isInvalid('email') ? 'true' : null"
            [attr.aria-describedby]="isInvalid('email') ? 'email-error' : null"
            class="mt-1.5 block w-full rounded-md border border-field bg-counter px-3 py-2 text-sm placeholder:text-muted transition-[border-color,box-shadow] duration-150 focus:border-signal focus:outline-none focus:ring-2 focus:ring-signal/40 aria-[invalid=true]:border-danger aria-[invalid=true]:focus:border-danger aria-[invalid=true]:focus:ring-danger/30"
          />
          @if (isInvalid('email')) {
            <p id="email-error" role="alert" class="mt-1.5 text-xs text-danger">
              Enter a valid email address.
            </p>
          }
        </div>

        <div>
          <label for="password" class="block text-sm font-medium">Password</label>
          <div class="relative mt-1.5">
            <input
              id="password"
              [type]="passwordVisible() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              [attr.aria-invalid]="isInvalid('password') ? 'true' : null"
              [attr.aria-describedby]="isInvalid('password') ? 'password-error' : null"
              class="block w-full rounded-md border border-field bg-counter py-2 pl-3 pr-11 text-sm placeholder:text-muted transition-[border-color,box-shadow] duration-150 focus:border-signal focus:outline-none focus:ring-2 focus:ring-signal/40 aria-[invalid=true]:border-danger aria-[invalid=true]:focus:border-danger aria-[invalid=true]:focus:ring-danger/30"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="passwordVisible()"
              class="absolute inset-y-0 right-0 flex items-center rounded-r-md px-3 text-muted transition-colors duration-150 hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-signal/40"
            >
              @if (passwordVisible()) {
                <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 3l18 18" />
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
                  <path d="M9.4 5.2A9.5 9.5 0 0 1 12 5c5 0 9 4.5 9 7a12 12 0 0 1-2.2 3.2M6.2 6.2C3.9 7.6 3 10.2 3 12c0 1.6 2.2 5 7 6.4" />
                </svg>
              } @else {
                <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2.5 12C4 8.5 7.5 5 12 5s8 3.5 9.5 7c-1.5 3.5-5 7-9.5 7s-8-3.5-9.5-7Z" />
                  <circle cx="12" cy="12" r="2.75" />
                </svg>
              }
            </button>
          </div>
          @if (isInvalid('password')) {
            <p id="password-error" role="alert" class="mt-1.5 text-xs text-danger">
              Password is required.
            </p>
          }
        </div>

        @if (error()) {
          <p role="alert" class="rounded-md bg-danger/10 px-3 py-2 text-sm text-danger">
            {{ error() }}
          </p>
        }

        <button
          type="submit"
          [disabled]="loading()"
          class="mt-1 inline-flex w-full items-center justify-center gap-2 rounded-md bg-signal px-4 py-2.5 text-sm font-semibold text-ink transition-colors duration-150 hover:bg-signal-hover focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-signal/50 focus-visible:ring-offset-2 focus-visible:ring-offset-counter disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (loading()) {
            <svg class="size-4 animate-spin motion-reduce:hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" />
              <path class="opacity-90" d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
            </svg>
          }
          {{ loading() ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </main>

  <footer class="border-t border-line px-6 py-4">
    <p class="mx-auto max-w-sm font-mono text-[0.7rem] tracking-wide text-muted">
      Authorized access only · asset-wise
    </p>
  </footer>
</div>
