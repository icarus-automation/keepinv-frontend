<div class="flex min-h-dvh bg-counter text-ink antialiased">
  @if (mobileOpen()) {
    <button
      type="button"
      class="fixed inset-0 z-30 bg-ink/40 lg:hidden"
      aria-label="Close navigation"
      (click)="closeMobile()"
    ></button>
  }

  <aside [class]="asideClasses()">
    <div class="flex h-14 shrink-0 items-center gap-2.5 border-b border-line px-4">
      <span class="grid h-7 w-7 shrink-0 place-items-center rounded-md bg-ink text-counter">
        <i class="pi pi-box text-lg" aria-hidden="true"></i>
      </span>
      <span [class]="labelClasses()" class="flex items-baseline gap-px text-base font-semibold tracking-tight">
        <span>asset</span><span class="text-muted">-wise</span>
      </span>
    </div>

    <nav class="flex-1 overflow-y-auto px-3 py-4" aria-label="Primary">
      <ul class="flex flex-col gap-0.5">
        @for (item of navItems; track item.label) {
          @let active = isActive(item);
          <li>
            @if (item.path) {
              <a
                [routerLink]="item.path"
                (click)="closeMobile()"
                [class]="navLinkClasses(active)"
                [attr.aria-label]="item.label"
                [attr.aria-current]="active ? 'page' : null"
                [attr.title]="collapsed() ? item.label : null"
              >
                <i [class]="item.icon" class="shrink-0 text-xl" [class.text-signal]="active" aria-hidden="true"></i>
                <span [class]="labelClasses()">{{ item.label }}</span>
              </a>
            } @else {
              <span
                [class]="disabledItemClasses()"
                aria-disabled="true"
                [attr.title]="collapsed() ? item.label + ' (coming soon)' : null"
              >
                <i [class]="item.icon" class="shrink-0 text-xl" aria-hidden="true"></i>
                <span [class]="labelClasses()">{{ item.label }}</span>
                <span
                  [class]="labelClasses()"
                  class="ml-auto rounded border border-line px-1.5 py-0.5 text-[0.625rem] font-medium uppercase tracking-wide text-muted/70"
                >
                  Soon
                </span>
              </span>
            }
          </li>
        }
      </ul>
    </nav>
  </aside>

  <div class="flex min-w-0 flex-1 flex-col">
    <header
      class="sticky top-0 z-20 flex h-14 shrink-0 items-center gap-3 border-b border-line bg-counter px-4 lg:px-6"
    >
      <button
        type="button"
        (click)="toggleNav()"
        aria-label="Toggle navigation"
        class="-ml-1 grid h-9 w-9 place-items-center rounded-md text-muted outline-none transition-colors hover:bg-line/60 hover:text-ink focus-visible:ring-2 focus-visible:ring-signal focus-visible:ring-offset-2 focus-visible:ring-offset-counter"
      >
        <i class="pi pi-bars text-xl" aria-hidden="true"></i>
      </button>

      <h1 class="truncate text-base font-semibold tracking-tight">{{ pageTitle() }}</h1>

      <div class="ml-auto flex items-center">
        <button
          type="button"
          (click)="userMenu.toggle($event)"
          aria-haspopup="true"
          aria-label="Account menu"
          class="flex items-center gap-2.5 rounded-md py-1 pl-1 pr-2 text-left outline-none transition-colors hover:bg-line/60 focus-visible:ring-2 focus-visible:ring-signal focus-visible:ring-offset-2 focus-visible:ring-offset-counter"
        >
          <span class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-line text-xs font-semibold text-ink">
            {{ initials() }}
          </span>
          <span class="hidden leading-tight sm:flex sm:flex-col">
            <span class="text-sm font-medium">{{ displayName() }}</span>
            <span class="text-xs capitalize text-muted">{{ roleLabel() }}</span>
          </span>
          <i class="pi pi-chevron-down hidden text-base text-muted sm:inline-block" aria-hidden="true"></i>
        </button>
        <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body" styleClass="min-w-44" />
      </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6 lg:px-6">
      <router-outlet />
    </main>
  </div>
</div>
